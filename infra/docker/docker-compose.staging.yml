name: buildingos-staging

networks:
  buildingos_staging_net:
    driver: bridge
  pawtech_public:
    external: true

services:
  postgres:
    image: postgres:16-alpine
    container_name: buildingos-staging-postgres
    networks:
      - buildingos_staging_net
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB is required}
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5434}:5432"
    volumes:
      - buildingos_staging_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-buildingos} -d ${POSTGRES_DB:-buildingos_staging_db}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: buildingos-staging-redis
    networks:
      - buildingos_staging_net
    ports:
      - "127.0.0.1:${REDIS_PORT:-6381}:6379"
    volumes:
      - buildingos_staging_redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    container_name: buildingos-staging-minio
    networks:
      - buildingos_staging_net
      - pawtech_public
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?MINIO_ROOT_USER is required}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required}
      S3_BUCKET: ${S3_BUCKET:?S3_BUCKET is required}
    ports:
      - "127.0.0.1:${MINIO_API_PORT:-9110}:9000"
      - "127.0.0.1:${MINIO_CONSOLE_PORT:-9111}:9001"
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=pawtech_public"
      - "traefik.http.routers.buildingos-staging-files.rule=Host(`buildingos-staging-files.31-220-98-21.sslip.io`)"
      - "traefik.http.routers.buildingos-staging-files.entrypoints=websecure"
      - "traefik.http.routers.buildingos-staging-files.tls=true"
      - "traefik.http.routers.buildingos-staging-files.tls.certresolver=letsencrypt"
      - "traefik.http.services.buildingos-staging-files.loadbalancer.server.port=9000"
    volumes:
      - buildingos_staging_miniodata:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  createbuckets:
    image: minio/mc:latest
    container_name: buildingos-staging-mc
    networks:
      - buildingos_staging_net
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?MINIO_ROOT_USER is required}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required}
      S3_BUCKET: ${S3_BUCKET:?S3_BUCKET is required}
    entrypoint:
      - /bin/sh
      - -c
      - >
        mc alias set myminio http://minio:9000 ${MINIO_ROOT_USER:?MINIO_ROOT_USER is required} ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required};
        mc mb --ignore-existing myminio/${S3_BUCKET:?S3_BUCKET is required};
        exit 0;
    restart: on-failure

  mailpit:
    image: axllent/mailpit:v1.30.0
    container_name: buildingos-staging-mailpit
    networks:
      - buildingos_staging_net
    ports:
      - "127.0.0.1:${MAILPIT_UI_PORT:-8026}:8025"
    restart: unless-stopped

  buildingos-api:
    build:
      context: ../../
      dockerfile: apps/api/Dockerfile
    container_name: buildingos-staging-api
    networks:
      - buildingos_staging_net
      - pawtech_public
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      mailpit:
        condition: service_started
    ports:
      - "127.0.0.1:${API_PORT:-4010}:3000"
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=pawtech_public"
      - "traefik.http.routers.buildingos-staging-api.rule=Host(`buildingos-api-staging.31-220-98-21.sslip.io`)"
      - "traefik.http.routers.buildingos-staging-api.entrypoints=websecure"
      - "traefik.http.routers.buildingos-staging-api.tls=true"
      - "traefik.http.routers.buildingos-staging-api.tls.certresolver=letsencrypt"
      - "traefik.http.services.buildingos-staging-api.loadbalancer.server.port=3000"
    environment:
      APP_ENV: staging
      NODE_ENV: ${NODE_ENV:?NODE_ENV is required}
      DATABASE_URL: postgresql://${POSTGRES_USER:?POSTGRES_USER is required}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/${POSTGRES_DB:?POSTGRES_DB is required}
      REDIS_URL: ${REDIS_URL:?REDIS_URL is required}
      WEB_ORIGIN: ${WEB_ORIGIN:?WEB_ORIGIN is required}
      APP_BASE_URL: ${APP_BASE_URL:?APP_BASE_URL is required}
      S3_ENDPOINT: http://minio:9000
      S3_REGION: ${S3_REGION:?S3_REGION is required}
      S3_ACCESS_KEY: ${MINIO_ROOT_USER:?MINIO_ROOT_USER is required}
      S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required}
      S3_BUCKET: ${S3_BUCKET:?S3_BUCKET is required}
      S3_FORCE_PATH_STYLE: "true"
      S3_PUBLIC_BASE_URL: ${S3_PUBLIC_BASE_URL:?S3_PUBLIC_BASE_URL is required}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:?JWT_EXPIRES_IN is required}
      SENTRY_DSN: ${SENTRY_DSN:-}
      SENTRY_ENVIRONMENT: ${SENTRY_ENVIRONMENT:-staging}
      MAIL_PROVIDER: ${MAIL_PROVIDER:?MAIL_PROVIDER is required}
      MAIL_FROM: ${MAIL_FROM:?MAIL_FROM is required}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SALES_TEAM_EMAIL: ${SALES_TEAM_EMAIL:-}
      INFO_EMAIL: ${INFO_EMAIL:-}
      PAYMENT_PROVIDER: ${PAYMENT_PROVIDER:?PAYMENT_PROVIDER is required}
      AI_PROVIDER: ${AI_PROVIDER:?AI_PROVIDER is required}
      AI_OLLAMA_URL: ${AI_OLLAMA_URL:-}
      AI_OLLAMA_MODEL: ${AI_OLLAMA_MODEL:-}
      AI_CLASSIFIER_MODEL: ${AI_CLASSIFIER_MODEL:-}
      FEATURE_PORTAL_RESIDENT: ${FEATURE_PORTAL_RESIDENT:?FEATURE_PORTAL_RESIDENT is required}
      FEATURE_PAYMENTS_MVP: ${FEATURE_PAYMENTS_MVP:?FEATURE_PAYMENTS_MVP is required}
      LOG_LEVEL: ${LOG_LEVEL:?LOG_LEVEL is required}
      PORT: "3000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/ready"]
      interval: 30s
      timeout: 10s
      start_period: 10s
      retries: 3
    restart: unless-stopped

  buildingos-web:
    build:
      context: ../../
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${API_URL:?API_URL is required}
    container_name: buildingos-staging-web
    networks:
      - buildingos_staging_net
      - pawtech_public
    depends_on:
      buildingos-api:
        condition: service_healthy
    ports:
      - "127.0.0.1:${WEB_PORT:-4011}:3000"
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=pawtech_public"
      - "traefik.http.routers.buildingos-staging.rule=Host(`buildingos-staging.31-220-98-21.sslip.io`)"
      - "traefik.http.routers.buildingos-staging.entrypoints=websecure"
      - "traefik.http.routers.buildingos-staging.tls=true"
      - "traefik.http.routers.buildingos-staging.tls.certresolver=letsencrypt"
      - "traefik.http.services.buildingos-staging.loadbalancer.server.port=3000"
    environment:
      APP_ENV: staging
      NODE_ENV: ${NODE_ENV:?NODE_ENV is required}
      NEXT_PUBLIC_API_URL: ${API_URL:?API_URL is required}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      start_period: 15s
      retries: 3
    restart: unless-stopped

volumes:
  buildingos_staging_pgdata:
  buildingos_staging_miniodata:
  buildingos_staging_redisdata:
