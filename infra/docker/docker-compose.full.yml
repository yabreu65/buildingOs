include:
  - docker-compose.yml

name: buildingos

networks:
  buildingos_net:
    driver: bridge

services:
  postgres:
    restart: unless-stopped

  redis:
    restart: unless-stopped

  minio:
    restart: unless-stopped

  buildingos-api:
    build:
      context: ../../
      dockerfile: apps/api/Dockerfile
    container_name: buildingos-api
    networks:
      - buildingos_net
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    ports:
      - "${API_PORT:-3010}:3000"
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      DATABASE_URL: postgresql://${POSTGRES_USER:-buildingos}:${POSTGRES_PASSWORD:-buildingos}@postgres:5432/${POSTGRES_DB:-buildingos}
      REDIS_URL: redis://redis:6379
      WEB_ORIGIN: ${WEB_ORIGIN:-http://localhost:3011}
      APP_BASE_URL: ${APP_BASE_URL:-http://localhost:3011}
      S3_ENDPOINT: http://minio:9000
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_ACCESS_KEY: ${MINIO_ROOT_USER:-buildingos}
      S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-buildingos123}
      S3_BUCKET: ${S3_BUCKET:-buildingos-local}
      S3_FORCE_PATH_STYLE: "true"
      S3_PUBLIC_BASE_URL: ${S3_PUBLIC_BASE_URL:-http://localhost:9100/buildingos-local}
      JWT_SECRET: ${JWT_SECRET:-your-secret-key-change-in-production}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      SENTRY_DSN: ${SENTRY_DSN:-}
      MAIL_PROVIDER: ${MAIL_PROVIDER:-none}
      MAIL_FROM: ${MAIL_FROM:-BuildingOS <no-reply@buildingos.local>}
      FEATURE_PORTAL_RESIDENT: ${FEATURE_PORTAL_RESIDENT:-true}
      FEATURE_PAYMENTS_MVP: ${FEATURE_PAYMENTS_MVP:-true}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      PORT: "3000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      start_period: 10s
      retries: 3
    restart: unless-stopped

  buildingos-web:
    build:
      context: ../../
      dockerfile: apps/web/Dockerfile
    container_name: buildingos-web
    networks:
      - buildingos_net
    depends_on:
      buildingos-api:
        condition: service_healthy
    ports:
      - "${WEB_PORT:-3011}:3000"
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      NEXT_PUBLIC_API_URL: http://buildingos-api:3000
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      start_period: 15s
      retries: 3
    restart: unless-stopped
