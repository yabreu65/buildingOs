name: E2E Tests

on:
  push:
    branches: [main, develop]
    paths:
      - '.github/workflows/e2e-tests.yml'
      - 'package.json'
      - 'package-lock.json'
      - 'apps/api/**'
      - 'apps/web/**'
      - 'packages/**'
      - 'scripts/**'
  pull_request:
    branches: [main, develop]
    paths:
      - '.github/workflows/e2e-tests.yml'
      - 'package.json'
      - 'package-lock.json'
      - 'apps/api/**'
      - 'apps/web/**'
      - 'packages/**'
      - 'scripts/**'
  schedule:
    - cron: '0 2 * * *' # Run daily at 2 AM UTC

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  test:
    name: E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://buildingos@localhost:5432/buildingos_test
      WEB_ORIGIN: http://localhost:3000
      APP_BASE_URL: http://localhost:3000
      NEXT_PUBLIC_API_URL: http://localhost:4000
      TEST_E2E_PASSWORD: ${{ secrets.TEST_E2E_PASSWORD }}
      S3_ENDPOINT: http://localhost:9000
      S3_BUCKET: buildingos-test
      S3_PUBLIC_BASE_URL: http://localhost:9000/buildingos-test
      S3_FORCE_PATH_STYLE: true
      MAIL_PROVIDER: none
      FEATURE_PORTAL_RESIDENT: "true"
      FEATURE_PAYMENTS_MVP: "true"
      PORT: 4000

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: buildingos
          POSTGRES_HOST_AUTH_METHOD: trust
          POSTGRES_DB: buildingos_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate CI test credentials
        run: |
          echo "JWT_SECRET=$(openssl rand -hex 32)" >> "$GITHUB_ENV"
          echo "S3_ACCESS_KEY=ci-$(openssl rand -hex 8)" >> "$GITHUB_ENV"
          echo "S3_SECRET_KEY=$(openssl rand -hex 32)" >> "$GITHUB_ENV"

      - name: Setup environment
        run: |
          cat > .env.test <<EOF
          NODE_ENV=${NODE_ENV}
          DATABASE_URL=${DATABASE_URL}
          JWT_SECRET=${JWT_SECRET}
          WEB_ORIGIN=${WEB_ORIGIN}
          APP_BASE_URL=${APP_BASE_URL}
          NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
          TEST_E2E_PASSWORD=${TEST_E2E_PASSWORD}
          S3_ENDPOINT=${S3_ENDPOINT}
          S3_ACCESS_KEY=${S3_ACCESS_KEY}
          S3_SECRET_KEY=${S3_SECRET_KEY}
          S3_BUCKET=${S3_BUCKET}
          S3_PUBLIC_BASE_URL=${S3_PUBLIC_BASE_URL}
          S3_FORCE_PATH_STYLE=${S3_FORCE_PATH_STYLE}
          MAIL_PROVIDER=${MAIL_PROVIDER}
          EOF

      - name: Build internal packages
        run: npm run build:packages

      - name: Generate Prisma client
        working-directory: apps/api
        run: npm run prisma:generate

      - name: Build API
        working-directory: apps/api
        run: npm run build

      - name: Run database migrations
        working-directory: apps/api
        run: npm run migrate:deploy

      - name: Seed deterministic test data
        working-directory: apps/api
        run: npm run seed:test

      - name: Start API server
        working-directory: apps/api
        run: |
          node dist/main.js &
          API_PID=$!
          echo "API_PID=$API_PID" >> $GITHUB_ENV
          # Wait for API to be ready
          for i in {1..30}; do
            if curl -fsS http://localhost:4000/health > /dev/null; then
              echo "API is ready!"
              break
            fi
            if [ "$i" -eq 30 ]; then
              echo "API failed to become ready within 30 seconds"
              exit 1
            fi
            sleep 1
          done

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        id: e2e-tests
        run: npm run test:e2e -w apps/web -- --project=chromium
        env:
          BASE_URL: http://localhost:3000
          PORT: 3000

      - name: Stop API server
        if: always()
        run: |
          if [ -n "${API_PID:-}" ] && kill -0 "$API_PID" 2>/dev/null; then
            kill "$API_PID"
          else
            echo "::warning::API process already stopped or not accessible from this shell"
          fi

      - name: Upload playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: apps/web/playwright-report/
          retention-days: 30

      - name: Upload test videos
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: test-videos
          path: apps/web/test-results/
          retention-days: 7

      - name: Comment PR with test results
        if: github.event_name == 'pull_request' && always()
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const core = require('@actions/core');
            const reportPath = 'apps/web/playwright-report/index.html';
            const e2eOutcome = '${{ steps.e2e-tests.outcome }}';

            let comment = '## E2E Test Results\n\n';
            if (e2eOutcome === 'success' && fs.existsSync(reportPath)) {
              comment += '✅ Tests completed! [View detailed report](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})\n';
            } else {
              comment += '⚠️ Tests failed or report not found. [Open the run for details](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})\n';
            }

            try {
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: comment
              });
            } catch (error) {
              const message = error instanceof Error ? error.message : String(error);
              core.warning(`Failed to comment on the PR: ${message}`);
            }
